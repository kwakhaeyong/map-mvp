name: MAP OS n8n Webhook

on:
  workflow_run:
    workflows:
      - "MAP Quality Gate"
      - "Production Smoke Check"
    types:
      - completed
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      test_status:
        description: "Test status sent to n8n"
        required: false
        default: "manual_test"

permissions:
  contents: read

jobs:
  notify-n8n:
    runs-on: ubuntu-latest
    steps:
      - name: Skip when webhook secret is missing
        if: ${{ secrets.N8N_MAP_OS_WEBHOOK == '' }}
        run: echo "N8N_MAP_OS_WEBHOOK is not configured yet; skipping notification."

      - name: Send MAP OS event to n8n
        if: ${{ secrets.N8N_MAP_OS_WEBHOOK != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.N8N_MAP_OS_WEBHOOK }}
          EVENT_NAME: ${{ github.event_name }}
          REPOSITORY: ${{ github.repository }}
          REF_NAME: ${{ github.ref_name }}
          SHA: ${{ github.sha }}
          ACTOR: ${{ github.actor }}
          WORKFLOW_NAME: ${{ github.event.workflow_run.name || 'main-push' }}
          WORKFLOW_STATUS: ${{ github.event.workflow_run.status || 'completed' }}
          WORKFLOW_CONCLUSION: ${{ github.event.workflow_run.conclusion || inputs.test_status || 'success' }}
          WORKFLOW_URL: ${{ github.event.workflow_run.html_url || format('https://github.com/{0}/commit/{1}', github.repository, github.sha) }}
        run: |
          payload=$(jq -n \
            --arg event "$EVENT_NAME" \
            --arg repository "$REPOSITORY" \
            --arg ref "$REF_NAME" \
            --arg sha "$SHA" \
            --arg actor "$ACTOR" \
            --arg workflow "$WORKFLOW_NAME" \
            --arg status "$WORKFLOW_STATUS" \
            --arg conclusion "$WORKFLOW_CONCLUSION" \
            --arg url "$WORKFLOW_URL" \
            --arg production_url "https://mapdecision.com" \
            '{
              source: "github-actions",
              event: $event,
              repository: $repository,
              ref: $ref,
              sha: $sha,
              actor: $actor,
              workflow: $workflow,
              status: $status,
              conclusion: $conclusion,
              workflow_url: $url,
              production_url: $production_url,
              sent_at: (now | todateiso8601)
            }')

          curl --fail-with-body --show-error --silent \
            --retry 3 \
            --retry-delay 5 \
            -H "Content-Type: application/json" \
            -X POST \
            -d "$payload" \
            "$WEBHOOK_URL"
