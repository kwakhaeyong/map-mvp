name: Notify n8n on Merge

on:
  pull_request:
    types: [closed]

permissions:
  contents: read

jobs:
  notify:
    if: >-
      github.event.pull_request.merged == true &&
      github.event.pull_request.base.ref == 'main'
    runs-on: ubuntu-latest
    steps:
      - name: Skip when webhook secret is missing
        if: ${{ secrets.N8N_MERGE_WEBHOOK == '' }}
        run: echo "N8N_MERGE_WEBHOOK is not configured yet; skipping notification."

      - name: Notify n8n of merge
        if: ${{ secrets.N8N_MERGE_WEBHOOK != '' }}
        env:
          WEBHOOK_URL: ${{ secrets.N8N_MERGE_WEBHOOK }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          TITLE: ${{ github.event.pull_request.title }}
          MERGED_AT: ${{ github.event.pull_request.merged_at }}
        run: |
          payload=$(jq -n \
            --arg pr_number "$PR_NUMBER" \
            --arg title "$TITLE" \
            --arg merged_at "$MERGED_AT" \
            '{title: $title, pr_number: ($pr_number | tonumber), merged_at: $merged_at}')
          curl --fail-with-body --show-error --silent \
            --retry 3 --retry-delay 5 \
            -H "Content-Type: application/json" \
            -X POST -d "$payload" "$WEBHOOK_URL"
