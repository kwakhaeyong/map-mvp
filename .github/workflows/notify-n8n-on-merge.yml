name: Notify n8n on Merge

on:
  push:
    branches: [main]
  workflow_run:
    workflows: ["Guarded Auto Merge"]
    types: [completed]

permissions:
  contents: read

jobs:
  notify:
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      N8N_WEBHOOK: ${{ secrets.N8N_MERGE_WEBHOOK }}
    steps:
      - name: Skip when webhook secret is missing
        if: ${{ env.N8N_WEBHOOK == '' }}
        run: echo "N8N_MERGE_WEBHOOK is not configured yet; skipping notification."

      - name: Notify n8n of merge
        if: ${{ env.N8N_WEBHOOK != '' }}
        env:
          WEBHOOK_URL: ${{ env.N8N_WEBHOOK }}
          COMMIT_SHA: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}
          COMMIT_MESSAGE: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_commit.message || github.event.head_commit.message }}
          COMMIT_TIMESTAMP: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_commit.timestamp || github.event.head_commit.timestamp }}
        run: |
          TITLE=$(head -n1 <<< "$COMMIT_MESSAGE")
          SHORT_SHA="${COMMIT_SHA:0:7}"
          payload=$(jq -n \
            --arg title "$TITLE" \
            --arg pr_number "$SHORT_SHA" \
            --arg merged_at "$COMMIT_TIMESTAMP" \
            '{title: $title, pr_number: $pr_number, merged_at: $merged_at}')
          curl --fail-with-body --show-error --silent \
            --retry 3 --retry-delay 5 \
            -H "Content-Type: application/json" \
            -X POST -d "$payload" "$WEBHOOK_URL"
